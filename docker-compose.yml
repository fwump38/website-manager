version: "3.8"

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /mnt/user/sites:/sites:ro
      - /mnt/user/appdata/caddy/config:/etc/caddy
      - /mnt/user/appdata/caddy/data:/data

  site-manager:
    image: ghcr.io/fwump38/website-manager:latest
    container_name: site-manager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    ports:
      - "8080:8080"
    volumes:
      - /mnt/user/sites:/sites
      - /mnt/user/appdata/caddy/config:/etc/caddy
    environment:
      - SITES_DIR=/sites
      - CADDYFILE_OUTPUT=/etc/caddy/Caddyfile
      - CADDY_ADMIN_URL=http://caddy:2019
      - DASHBOARD_PORT=8080
      - CF_API_TOKEN=${CF_API_TOKEN:-}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID:-}
      - CF_TUNNEL_ID=${CF_TUNNEL_ID:-}
      - CADDY_SERVICE_URL=${CADDY_SERVICE_URL:-http://caddy:80}
      - PUID=${PUID:-99}
      - PGID=${PGID:-100}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY:-}
      # Bind the dashboard to a specific address. Leave empty to bind all
      # interfaces (required when reached via Cloudflare Tunnel from the host).
      # Set to 127.0.0.1 to restrict to localhost only.
      - DASHBOARD_BIND=${DASHBOARD_BIND:-}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN:-}
    depends_on:
      - caddy

