<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Site Manager</title>
<style>
body { margin: 0; font-family: Inter,system-ui,sans-serif; background: #111827; color: #f9fafb; }
.container { max-width: 1000px; margin: 0 auto; padding: 24px; }
header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 24px; }
h1 { margin: 0; font-size: 2rem; }
.status { color: #9ca3af; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.card { background: #1f2937; border: 1px solid #374151; border-radius: 16px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); }
.card h2 { margin: 0 0 12px; font-size: 1.1rem; }
.badge { display: inline-flex; padding: 4px 10px; border-radius: 999px; font-size: 0.8rem; letter-spacing: 0.02em; }
.badge.enabled { background: #10b981; color: #ecfccb; }
.badge.disabled { background: #6b7280; color: #f3f4f6; }
.toggle { display: inline-flex; align-items: center; gap: 12px; margin-top: 20px; }
button { background: #2563eb; color: white; border: none; border-radius: 999px; padding: 12px 18px; cursor: pointer; transition: background 0.2s ease; }
button:disabled { opacity: 0.5; cursor: default; }
button:hover:not(:disabled) { background: #1d4ed8; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #d1d5db; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); }}
</style>
</head>
<body>
<div class="container">
<header>
<div>
<h1>Site Manager</h1>
<p class="status" id="status">Loading sites…</p>
</div>
<div><button id="refresh">Refresh</button></div>
</header>
<div class="grid" id="siteGrid"></div>
</div>
<script>
const statusEl = document.getElementById('status');
const grid = document.getElementById('siteGrid');
const refreshButton = document.getElementById('refresh');

refreshButton.addEventListener('click', fetchSites);

function formatDate(value) {
  return new Date(value).toLocaleString();
}

async function fetchSites() {
  statusEl.textContent = 'Loading sites…';
  grid.innerHTML = '';
  try {
    const res = await fetch('/api/sites');
    if (!res.ok) throw new Error('Failed to fetch sites');
    const sites = await res.json();
    renderSites(sites);
    statusEl.textContent = `${sites.length} site${sites.length === 1 ? '' : 's'} discovered`;
  } catch (err) {
    statusEl.textContent = err.message;
  }
}

function renderSites(sites) {
  if (!sites.length) {
    grid.innerHTML = '<p>No sites discovered yet. Create a new directory in the mounted sites folder.</p>';
    return;
  }
  grid.innerHTML = sites.map(site => `
    <div class="card" id="site-${site.name}">
      <h2>${site.name}</h2>
      <div class="badge ${site.enabled ? 'enabled' : 'disabled'}">${site.enabled ? 'Enabled' : 'Disabled'}</div>
      <p style="margin-top: 12px; color: #d1d5db;">Discovered: ${formatDate(site.discovered_at)}</p>
      <div class="toggle">
        <button data-site="${encodeURIComponent(site.name)}" data-enabled="${site.enabled}">${site.enabled ? 'Disable' : 'Enable'}</button>
        <span class="hint">${site.enabled ? 'Live on Cloudflare + Caddy' : 'Not published yet'}</span>
      </div>
    </div>`).join('');

  grid.querySelectorAll('button[data-site]').forEach(button => {
    button.addEventListener('click', () => toggleSite(button));
  });
}

async function toggleSite(button) {
  const siteName = decodeURIComponent(button.dataset.site);
  const enabled = button.dataset.enabled === 'true';
  button.disabled = true;
  const indicator = document.createElement('span');
  indicator.className = 'spinner';
  button.parentNode.appendChild(indicator);
  try {
    const res = await fetch(`/api/sites/${encodeURIComponent(siteName)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: !enabled })
    });
    if (!res.ok) throw new Error('update failed');
    await fetchSites();
  } catch (err) {
    statusEl.textContent = err.message;
  } finally {
    button.disabled = false;
    indicator.remove();
  }
}

fetchSites();
</script>
</body>
</html>
